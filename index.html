<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moyu Window</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    
    #window-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* 顶部 1/10 总控制热区 */
    #top-hot-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 10%;            /* 1/10 高度 */
      z-index: 99999;
      display: flex;
      background: transparent;
      pointer-events: none;   /* 默认完全穿透，不影响点击右侧网页 */
    }

    /* 🎯 绝妙精简：只有左半边拦截鼠标，用来拖拽 */
    #drag-zone {
      width: 50%;             /* 只有左半边 50% 宽度 */
      height: 100%;
      background: transparent;
      pointer-events: auto;   /* 开启鼠标响应 */
      -webkit-app-region: drag; /* 允许拖拽 */
    }
    #drag-zone:hover {
      cursor: move;           /* 悬停时鼠标变成十字箭头 */
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>

  <div id="window-container">
    <div id="top-hot-bar">
      <div id="drag-zone" title="按住拖动窗口"></div>
    </div>
    
    <webview id="wv" src="https://www.douyin.com" preload="./preload.js" allowpopups></webview>
  </div>

</body>
</html>
